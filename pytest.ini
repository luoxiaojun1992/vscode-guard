[pytest]
testpaths = tests
addopts = -v --timeout=90
filterwarnings =
    # Python 3.12 on Linux raises RuntimeError when root.after() is called from a
    # non-main thread because Tkinter's Tcl interpreter is not thread-safe on that
    # platform.  On Windows (the actual target) this constraint does not apply.
    ignore::pytest.PytestUnhandledThreadExceptionWarning
